  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>Padsite Manufacturing — Coming Soon<\u002Ftitle>\n<meta name=\"description\" content=\"Padsite Manufacturing — Quick Service Restaurant fabrication. Coming soon.\">\n\n\n\n<style>\n  /* brand display face — the wordmark is real Quantico (matches the live site) */\n  @font-face{font-family:\"Quantico\";src:url(\"226ba4e7-db41-47fc-835c-d753f2270a32\") format(\"truetype\");font-weight:700;font-style:normal;font-display:swap}\n  @font-face{font-family:\"Quantico\";src:url(\"71b8b33f-2ee7-40b4-b85e-18c698eab567\") format(\"truetype\");font-weight:400;font-style:normal;font-display:swap}\n\n  :root{\n    --ink:#1A1A1A; --muted:#8F8B83; --orange:#C36B27;\n    --font-brand:\"Quantico\",\"Saira\",system-ui,sans-serif;\n    --font-ui:-apple-system,BlinkMacSystemFont,\"SF Pro Display\",\"Helvetica Neue\",Helvetica,Arial,sans-serif;\n  }\n  *{box-sizing:border-box}\n  html,body{height:100%}\n  body{\n    margin:0; overflow:hidden;\n    background:radial-gradient(120% 120% at 50% 38%,#ffffff 0%,#f3f1ec 100%);\n    color:var(--ink);\n  }\n\n  /* centred assembly stage — mirrors the site's opening intro */\n  .stage{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 24px}\n  #mark{width:min(42vmin,348px);height:min(42vmin,348px);display:flex;align-items:center;justify-content:center}\n  #mark .markSvg{width:100%;height:100%;display:block;overflow:visible}\n\n  .word{margin-top:34px;font-family:var(--font-brand);font-weight:700;letter-spacing:.22em;padding-left:.22em;\n    text-align:center;white-space:nowrap;font-size:clamp(13px,1.6vw,17px);color:var(--ink);text-transform:uppercase;\n    opacity:0;transform:translateY(9px)}\n  .word span{color:var(--orange)}\n  .sub{margin-top:12px;font-family:var(--font-ui);font-weight:600;font-size:clamp(9.5px,1.05vw,11px);\n    letter-spacing:.32em;padding-left:.32em;text-align:center;text-transform:uppercase;color:var(--muted);opacity:0}\n\n  /* coming soon — held at the bottom once the mark settles */\n  .soon{position:fixed;left:0;right:0;bottom:clamp(34px,6.5vh,62px);display:flex;align-items:center;justify-content:center;gap:12px;\n    font-family:var(--font-brand);font-weight:700;font-size:clamp(12px,1.5vw,16px);letter-spacing:.26em;padding-left:.26em;\n    text-transform:uppercase;color:var(--ink);opacity:0;transform:translateY(10px)}\n  .soon .dot{width:8px;height:8px;border-radius:50%;background:var(--orange);flex:none;margin-left:-.26em;\n    box-shadow:0 0 0 0 rgba(195,107,39,.5);animation:ping 2.2s cubic-bezier(.16,.84,.32,1) infinite}\n  @keyframes ping{\n    0%{box-shadow:0 0 0 0 rgba(195,107,39,.5)}\n    70%{box-shadow:0 0 0 11px rgba(195,107,39,0)}\n    100%{box-shadow:0 0 0 0 rgba(195,107,39,0)}\n  }\n  @media (prefers-reduced-motion: reduce){.soon .dot{animation:none}}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n  <main class=\"stage\">\n    <div id=\"mark\" role=\"img\" aria-label=\"Padsite Manufacturing mark\"><\u002Fdiv>\n    <div class=\"word\">PADSITE<span>·<\u002Fspan>MANUFACTURING<\u002Fdiv>\n    <div class=\"sub\">Quick Service Restaurant Fabrication<\u002Fdiv>\n  <\u002Fmain>\n  <div class=\"soon\"><span class=\"dot\"><\u002Fspan>Coming Soon<\u002Fdiv>\n\n<script src=\"98d514cb-c738-48d3-9256-a5dfb30511ca\"><\u002Fscript>\n<script src=\"ce3eef8a-e866-41bf-92d1-45b870d65132\"><\u002Fscript>\n<script>\n(function(){\n  var reduce = window.matchMedia && window.matchMedia(\"(prefers-reduced-motion: reduce)\").matches;\n  function clamp01(v){return Math.max(0,Math.min(1,v));}\n  function eOutExpo(t){t=clamp01(t);return t===1?1:1-Math.pow(2,-10*t);}\n\n  var markEl = document.getElementById(\"mark\");\n  var word   = document.querySelector(\".word\");\n  var sub    = document.querySelector(\".sub\");\n  var soon   = document.querySelector(\".soon\");\n\n  function revealText(){\n    word.style.transition=\"opacity 1.4s ease,transform 1.5s cubic-bezier(.2,.7,.2,1)\";\n    word.style.transform=\"translateY(0)\"; word.style.opacity=\"1\";\n    sub.style.transition=\"opacity 1.4s ease .12s\"; sub.style.opacity=\"1\";\n  }\n  function revealSoon(){\n    soon.style.transition=\"opacity 1s ease,transform 1s cubic-bezier(.2,.7,.2,1)\";\n    soon.style.opacity=\"1\"; soon.style.transform=\"none\";\n  }\n\n  function build(){\n    // identical mark + colourway to the live site's opening animation\n    markEl.innerHTML = window.PadsiteMotion.facetSVG(\"full\");\n    var svg = markEl.firstChild;\n    if (svg && svg.style){ svg.style.filter=\"drop-shadow(0 16px 34px rgba(40,28,14,.14))\"; svg.style.transformOrigin=\"center\"; }\n    var facets = [].slice.call(markEl.querySelectorAll(\".fc\"));\n    var n = facets.length, MAG = 60;\n    facets.forEach(function(el){ el.style.transformBox=\"fill-box\"; el.style.transformOrigin=\"center\"; el.style.willChange=\"transform,opacity\"; });\n\n    function setAssemble(el,i,s){\n      var nx=+el.style.getPropertyValue(\"--nx\"), ny=+el.style.getPropertyValue(\"--ny\");\n      var tx=(1-s)*nx*MAG, ty=(1-s)*ny*MAG, rot=(1-s)*(i%2?9:-8), sc=0.72+0.28*s;\n      el.style.transform=\"translate(\"+tx.toFixed(2)+\"px,\"+ty.toFixed(2)+\"px) rotate(\"+rot.toFixed(2)+\"deg) scale(\"+sc.toFixed(3)+\")\";\n      el.style.opacity=clamp01((s-0.06)*1.7).toFixed(3);\n    }\n    function settleAll(){ facets.forEach(function(el,i){ setAssemble(el,i,1); }); if(svg&&svg.style)svg.style.transform=\"scale(1)\"; }\n\n    if (reduce){ settleAll(); revealText(); revealSoon(); return; }\n\n    // blank-ish start: facets gathered in & invisible\n    facets.forEach(function(el,i){ setAssemble(el,i,0); });\n    if (svg && svg.style) svg.style.transform=\"scale(.975)\";\n\n    var DUR=3000, t0=null, worded=false;\n    function af(t){\n      if (t0==null) t0=t;\n      var p=Math.min(1,(t-t0)/DUR);\n      if (svg && svg.style) svg.style.transform=\"scale(\"+(0.975+0.025*eOutExpo(p)).toFixed(4)+\")\";\n      for (var i=0;i<n;i++){ setAssemble(facets[i],i,eOutExpo((p-(i*0.05))/0.62)); }\n      if (!worded && p>=0.45){ worded=true; revealText(); }\n      if (p<1){ requestAnimationFrame(af); }\n      else {\n        settleAll();\n        if (!worded){ worded=true; revealText(); }\n        setTimeout(revealSoon, 500);   // hold the formed P, then keep \"Coming Soon\"\n      }\n    }\n    setTimeout(function(){ requestAnimationFrame(af); }, 420);\n  }\n\n  (function wait(){\n    if (window.PadsiteLogo && window.PadsiteMotion && window.PadsiteMotion.facetSVG){ build(); }\n    else setTimeout(wait, 30);\n  })();\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
